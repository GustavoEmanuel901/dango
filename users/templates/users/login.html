{% extends "dangos/base.html" %}

{% block content %}

    {% if form.errors %}
        <p>Seu login e senha estão incorretos. Por favor, tente novamente.</p>
    {% endif %}

    <h2>Login</h2>
    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Entrar</button>
        <input type="hidden" name="next" value="{% url 'index' %}">
    </form>
{% endblock %}
