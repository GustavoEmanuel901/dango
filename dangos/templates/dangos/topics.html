{% extends "dangos/base.html" %}
{% block content %}

    <span>Tópicos: </span>
    <ul>
        {% for topic in topics %}
            <li>
                <a href="{% url 'topic' topic.id %}">{{ topic }}</a>
            </li>

            {% empty %}
                <p>Não há tópicos adicionados.</p>
        {% endfor %}

    </ul>

    <a href="{% url 'new_topic' %}">Adicionar Tópico</a>

{% endblock content %}
